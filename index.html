<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spot Robotics – Tomasz Pieczara</title>
  <meta name="description" content="Spot Robotics by Tomasz Pieczara – mobile apps DirectDrop, TrueBubble, and FogRider.">
  <meta name="author" content="Tomasz Pieczara">
  <meta name="keywords" content="Tomasz Pieczara, Spot Robotics, DirectDrop, TrueBubble, FogRider">
  <meta property="og:title" content="Spot Robotics – Tomasz Pieczara">
  <meta property="og:description" content="Mobile apps by Tomasz Pieczara: DirectDrop, TrueBubble, and FogRider.">
  <meta property="og:url" content="https://spotrobotics.app">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://spotrobotics.app/">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/favicon-512x512.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="google-site-verification" content="Wbl-x94Sn9Cj1bZDwVVuZwr8OXibxtNTEot1E8U-P4U" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Spot Robotics",
    "url": "https://spotrobotics.app",
    "founder": {
      "@type": "Person",
      "name": "Tomasz Pieczara"
    },
    "description": "Mobile apps by Tomasz Pieczara",
    "makesOffer": [
      { "@type": "Offer", "name": "DirectDrop" },
      { "@type": "Offer", "name": "TrueBubble" },
      { "@type": "Offer", "name": "FogRider" }
    ]
  }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 3rem;
    }
    .apps {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .app-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 1.5rem 2rem;
      text-align: center;
      min-width: 160px;
    }
    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      object-fit: cover;
      margin: 0 auto 0.75rem;
      display: block;
    }
    .app-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.75rem;
    }
    .app-card a {
      font-size: 0.8rem;
      color: #6b9fff;
      text-decoration: none;
    }
    .app-card a:hover { text-decoration: underline; }
    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="logo">Spot Robotics</div>
  <div class="tagline">Simple apps. Honest policies.</div>

  <div class="apps">
    <div class="app-card">
      <img class="app-icon" src="/icons/directdrop.png" alt="DirectDrop icon">
      <div class="app-name">DirectDrop</div>
      <a href="/directdrop/privacy.html">Privacy Policy</a>
    </div>
    <div class="app-card">
      <img class="app-icon" src="/icons/truebubble.jpg" alt="TrueBubble icon">
      <div class="app-name">TrueBubble</div>
      <a href="/truebubble/privacy.html">Privacy Policy</a>
    </div>
    <div class="app-card">
      <img class="app-icon" src="/icons/fogrider.png" alt="FogRider icon">
      <div class="app-name">FogRider</div>
      <a href="/fogrider/privacy.html">Privacy Policy</a>
    </div>
  </div>

  <footer>&copy; 2026 Spot Robotics &mdash; Tomasz Pieczara</footer>
</body>
</html>
